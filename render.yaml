services:
  - type: web
    name: coworking-hub-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: file:./dev.db
      - key: ENABLE_BOT
        value: "true"
      - key: BOT_TOKEN
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: MINI_APP_URL
        sync: false
